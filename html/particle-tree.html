<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>非遗粒子圣诞树 - 薪火拾遗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#2b0a10;
}
#treeCanvas{
  display:block;
  width:100%;
  height:100%;
}

.back-link{
  position:fixed;
  top:20px;
  left:20px;
  z-index:99;
  padding:8px 18px;
  background:rgba(139,21,38,0.85);
  color:#ffd358;
  text-decoration:none;
  border-radius:6px;
  font-size:14px;
  border:1px solid rgba(255,211,88,0.6);
  transition:all 0.3s;
}
.back-link:hover{
  background:#a91628;
  border-color:#ffd358;
}
</style>
</head>
<body>

<a href="over.html" class="back-link">← 返回非遗总览</a>
<canvas id="treeCanvas"></canvas>

<script>
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');

// 画布尺寸适配
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ========== 可调节参数 ==========
const fov = 600;
const autoRotateSpeed = 0.0015; // 旋转速度已调慢，数值越小越慢
const treeLayers = 22;
const particlePerLayer = 60;
const imgCount = 25;
const imgSize = 55;

const imgSrcList = [
   '../images1/1.6.png', '../images1/2.3.png',
  '../images1/3.1.png', '../images1/3.9.png',
  '../images1/4.4.png', '../images2/3.2.png',
  '../images1/4.4.png', '../images1/5.1.png', 
  '../images1/6.2.png', '../images1/6.5.png',
  '../images1/1.3.png', '../images1/3.5.png',
  '../images1/3.8.png', '../images1/6.3.png',
  '../images2/suxiu4.png', '../images2/ci1.png',
  '../images2/ci4.png', '../images2/suxiu1.png',
  '../images2/2.2.png', '../images2/5.1.png', 
  '../images2/2.2.png', '../images2/3.2.png',
  '../images2/4.2.png', '../images2/6.2.png',
  '../images2/jianzhi3.png', '../images2/card1.png'
];
// ================================

let angleY = 0;
let angleX = 0.2;

let treeParticles = [];
let imgParticles = [];
let starParticles = [];
let loadedImgs = [];

// 生成圣诞树粒子
function initTree(){
  treeParticles = [];
  const treeHeight = 400;
  const maxRadius = 200;
  
  for(let i=0; i<treeLayers; i++){
    const t = i / (treeLayers-1);
    const y = -treeHeight/2 + t * treeHeight;
    const radius = t * maxRadius;
    const count = Math.floor(particlePerLayer * (0.3 + t*0.7));
    
    for(let j=0; j<count; j++){
      const angle = (j / count) * Math.PI * 2;
      const r = radius * (0.8 + Math.random()*0.4);
      treeParticles.push({
        x: Math.cos(angle) * r,
        y: y + (Math.random()-0.5)*10,
        z: Math.sin(angle) * r,
        size: 2 + Math.random()*2
      });
    }
  }
  treeParticles.push({x:0, y:-treeHeight/2 - 25, z:0, size:6, isTop:true});
}

// 生成背景星空
function initStars(){
  starParticles = [];
  for(let i=0; i<700; i++){
    starParticles.push({
      x: (Math.random()-0.5)*2000,
      y: (Math.random()-0.5)*1500,
      z: Math.random()*800 + 200,
      size: Math.random()*1.5 + 0.5
    });
  }
}

// 图片加载：全部加载完成后再生成粒子，保证所有图片都参与随机
function loadImages(){
  let total = imgSrcList.length;
  let finished = 0;

  imgSrcList.forEach(src=>{
    const img = new Image();
    img.src = src;
    img.onload = img.onerror = ()=>{
      if(img.complete && img.naturalWidth > 0){
        loadedImgs.push(img);
      }
      finished++;
      // 所有图片处理完后，统一生成图片粒子
      if(finished === total){
        initImages();
      }
    };
  });
}

// 生成环绕图片：从所有加载成功的图片里随机
function initImages(){
  if(loadedImgs.length === 0) return;
  imgParticles = [];
  for(let i=0; i<imgCount; i++){
    const angle = Math.random() * Math.PI * 2;
    const radius = 260 + Math.random()*140;
    const y = (Math.random()-0.5) * 380;
    // 从全部有效图片里随机选取
    const randomImg = loadedImgs[Math.floor(Math.random() * loadedImgs.length)];
    imgParticles.push({
      x: Math.cos(angle) * radius,
      y: y,
      z: Math.sin(angle) * radius,
      img: randomImg
    });
  }
}

// 3D投影计算
function project(p){
  let x = p.x * Math.cos(angleY) - p.z * Math.sin(angleY);
  let z = p.x * Math.sin(angleY) + p.z * Math.cos(angleY);
  let y = p.y;
  
  let y2 = y * Math.cos(angleX) - z * Math.sin(angleX);
  let z2 = y * Math.sin(angleX) + z * Math.cos(angleX);
  
  const scale = fov / (fov + z2);
  return {
    x: x * scale + canvas.width/2,
    y: y2 * scale + canvas.height/2,
    scale: scale,
    z: z2
  };
}

// 渲染循环
function animate(){
  try {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    angleY += autoRotateSpeed;
    
    let renderList = [];
    
    // 收集星空
    starParticles.forEach(p=>{
      const proj = project(p);
      renderList.push({
        type:'star', z: proj.z, x: proj.x, y: proj.y,
        size: p.size * proj.scale, alpha: 0.4 + proj.scale * 0.3
      });
    });
    
    // 收集圣诞树
    treeParticles.forEach(p=>{
      const proj = project(p);
      renderList.push({
        type:'tree', z: proj.z, x: proj.x, y: proj.y,
        size: p.size * proj.scale, isTop: p.isTop
      });
    });
    
    // 收集图片
    imgParticles.forEach(p=>{
      if(!p.img || !p.img.complete || p.img.naturalWidth === 0) return;
      const proj = project(p);
      renderList.push({
        type:'img', z: proj.z, x: proj.x, y: proj.y,
        size: imgSize * proj.scale, img: p.img,
        alpha: 0.75 * proj.scale
      });
    });
    
    // 深度排序
    renderList.sort((a,b)=> b.z - a.z);
    
    // 批量绘制
    renderList.forEach(item=>{
      if(item.type === 'star'){
        ctx.fillStyle = `rgba(255,220,150,${item.alpha})`;
        ctx.beginPath();
        ctx.arc(item.x, item.y, item.size, 0, Math.PI*2);
        ctx.fill();
      }
      else if(item.type === 'tree'){
        ctx.fillStyle = '#ffd358';
        ctx.shadowBlur = item.isTop ? 20 : 4;
        ctx.shadowColor = item.isTop ? '#ffd358' : '#ffb020';
        ctx.beginPath();
        ctx.arc(item.x, item.y, item.size, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      else if(item.type === 'img'){
        ctx.globalAlpha = Math.min(1, item.alpha);
        ctx.drawImage(item.img, item.x - item.size/2, item.y - item.size/2, item.size, item.size);
        ctx.globalAlpha = 1;
      }
    });
  } catch(e) {
    console.warn('渲染单帧异常，已跳过', e);
  }
  requestAnimationFrame(animate);
}

// 启动
initTree();
initStars();
loadImages();
animate();
</script>
</body>
</html>
